title: Simon Schrottner
description: OpenFeature maintainer & CNCF Ambassador. Consulting and workshops on feature flagging, developer experience, and open-standards adoption — Austria, DACH region and remote.
author:
  name: Simon Schrottner
  email: simon@schrottner.at

url: https://schrottner.at

# Do not publish posts dated in the future until that date passes.
future: false

# GoatCounter analytics (hosted, cookieless, no consent banner).
# Set to your site code, e.g. "schrottner" for https://schrottner.goatcounter.com.
# Left empty, the analytics script is not emitted.
goatcounter_code: "aepfli"

# Giscus comments, backed by GitHub Discussions.
giscus:
  repo: "aepfli/aepfli.github.io"
  repo_id: "MDEwOlJlcG9zaXRvcnkzMzkxODI3Nzc="
  category: "Announcements"
  category_id: "DIC_kwDOFDeEuc4C_Y2i"
  mapping: "pathname"
  reactions_enabled: "1"
  theme: "preferred_color_scheme"

plugins:
  - jekyll-seo-tag

exclude:
  - README.md
  - .markdownlint.yaml
  - .spelling

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
