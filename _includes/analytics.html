{%- comment -%}
GoatCounter: hosted, cookieless, no consent banner required.
Only emitted when site.goatcounter_code is set.
{%- endcomment -%}
{%- if site.goatcounter_code and site.goatcounter_code != "" -%}
<script data-goatcounter="https://{{ site.goatcounter_code }}.goatcounter.com/count"
        async src="//gc.zgo.at/count.js"></script>
{%- endif -%}
